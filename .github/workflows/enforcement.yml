name: DIP Enforcement Guard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-dip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.26

      - name: Build Go Verifier
        run: go build -o dip-verify ./cmd/dip-verify

      - name: Run DIP Go Verifier
        run: |
          echo "Running DIP Go Verifier..."
          .\dip-verify || exit 1

      - name: Enforce Frozen Layers
        run: |
          python scripts/enforcement_guard.py || exit 2